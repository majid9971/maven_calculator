name: Maven Build and Test Workflow

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  codeql-analysis:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # Step 3: Set up JDK for CodeQL autobuild
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Step 4: Autobuild the project for CodeQL analysis
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Step 5: Perform CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Step 3: Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Step 4: Build and run tests
      - name: Build with Maven
        run: mvn clean package

      # Step 5: Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-jar
          path: target/myapp-2.0.jar

  consume-artifact:
    name: Consume Artifact
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Download the artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp-jar

        #Step 3 : RUN the JAR
      - name: Run the JAR
        run: java -jar myapp-2.0.jar
